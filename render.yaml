# IntelliLearn Quiz Engine — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → select this repo

services:
  - type: web
    name: intellilearn-quiz
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health.php
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: buta
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
