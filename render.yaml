# IntelliLearn Quiz Engine — Render Blueprint
#
# Paste this into Render Dashboard → New → Blueprint
# After deploy, create MySQL DB manually (see RENDER_DEPLOY.md)

services:
  - type: web
    name: intellilearn-quiz
    env: php
    region: oregon
    plan: free
    buildCommand: echo "Build complete."
    startCommand: php -S 0.0.0.0:$PORT -t public
    healthCheckPath: /health.php
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: buta
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
